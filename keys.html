<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano thing</title>
    <link rel="stylesheet" href="keys.css">
</head>
<body>
    
    <p>Plan:
        - Keys (html - list) 1
        - Key design (css) 1
        - Key funciton (jscript) 0
    </p>
    <!-- fulgte samme rekkefølge på bokstavene som videoen jeg tok inspirasjon fra,
     fordi....jeg vet ikke hvordan ellers-->
    <div class="board"> 

        <ul class="keys">

            <li class="whiteKey" data-key="01" id="a"><span>a</span></li>
            <li class="blackKey" data-key="02" id="w"><span>w</span></li>
            <li class="whiteKey" data-key="03" id="s"><span>s</span></li>
            <li class="blackKey" data-key="04" id="e"><span>e</span></li>
            <li class="whiteKey" data-key="05" id="d"><span>d</span></li>
            <li class="whiteKey" data-key="06" id="f"><span>f</span></li>
            <li class="blackKey" data-key="07" id="t"><span>t</span></li>
            <li class="whiteKey" data-key="08" id="g"><span>g</span></li>
            <li class="blackKey" data-key="09" id="y"><span>y</span></li>
            <li class="whiteKey" data-key="10" id="h"><span>h</span></li>
            <li class="blackKey" data-key="11" id="u"><span>u</span></li>
            <li class="whiteKey" data-key="12" id="j"><span>j</span></li>

        </ul>

    </div>

    <p id="demo"></p>
    
</body>
